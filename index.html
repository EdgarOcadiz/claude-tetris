<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="title-bar">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">🌙</button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section hidden" id="challenge-hud">
          <span class="label" id="challenge-hud-label">DESAFÍO</span>
          <span class="value" id="challenge-hud-value">--</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div class="overlay-actions">
          <button id="retry-btn">Reiniciar</button>
          <button id="menu-btn" class="hidden">Menú</button>
        </div>
      </div>
    </div>

    <div id="mode-overlay" class="overlay">
      <div class="overlay-box mode-box">
        <p class="overlay-title-alt">TETRIS</p>
        <div id="mode-select" class="mode-select">
          <button class="mode-btn" data-mode="classic">Modo Clásico</button>
          <button class="mode-btn" data-mode="challenge">Modo Desafío</button>
        </div>
        <div id="challenge-select" class="challenge-select hidden">
          <div id="challenge-list" class="challenge-list"></div>
          <button id="mode-back-btn" class="back-btn">← Volver</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
